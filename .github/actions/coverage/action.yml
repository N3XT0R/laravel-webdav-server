name: Upload and send coverage
description: Upload coverage artifact and send it to Qlty

inputs:
  artifact-name:
    description: Name of the uploaded coverage artifact
    required: true
    type: string
  coverage-file:
    description: Path to the coverage file
    required: true
    type: string
  qlty-token:
    description: Qlty coverage token
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.coverage-file }}

    - name: Send coverage to Qlty
      if: success()
      uses: qltysh/qlty-action/coverage@v2
      with:
        token: ${{ inputs.qlty-token }}
        files: ${{ inputs.coverage-file }}