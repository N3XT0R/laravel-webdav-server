name: run-tests

permissions:
  contents: read
  pull-requests: write
  
on:
  push:
    branches: [ '*/*', 'develop', 'main' ]
  pull_request:
    branches: [ '*/*', 'develop', 'main' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os: [ ubuntu-latest ]
        php: [ 8.4, 8.5 ]
        laravel: [ 13.*, 12.* ]
        stability: [ prefer-lowest, prefer-stable ]
        include:
          - laravel: 12.*
            testbench: 10.*
            carbon: 3.*
            collision: 8.*
          - laravel: 13.*
            testbench: 11.*
            carbon: 3.*
            collision: 8.*

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Prepare test environment
        uses: ./.github/actions/prepare-tests
        with:
          php-version: ${{ matrix.php }}
          laravel: ${{ matrix.laravel }}
          testbench: ${{ matrix.testbench }}
          carbon: ${{ matrix.carbon }}
          stability: ${{ matrix.stability }}

      - name: Execute tests
        run: vendor/bin/paratest --no-coverage --configuration phpunit.xml
